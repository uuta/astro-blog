name: Scheduled Netlify Build

on:
  schedule:
    # 毎日 9:00 JST (0:00 UTC) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:  # GitHub UI から手動実行を可能にする

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build
        run: |
          curl -X POST -d {} "${{ secrets.NETLIFY_BUILD_HOOK }}"

      - name: Check response
        run: echo "Build triggered successfully at $(date)"
